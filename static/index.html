<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模态文档问答助手</title>
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>💬 会话历史</h2>
                <button id="btn-refresh-sessions" class="btn-sidebar-action" title="刷新会话列表">🔄</button>
            </div>
            <div id="session-list">
                <p class="empty-hint">暂无历史会话</p>
            </div>
            <div class="sidebar-footer">
                <button id="btn-upload-kb" class="btn-sidebar-footer" title="上传文件到知识库">📎 上传知识库</button>
                <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.txt,.md" hidden multiple>
            </div>
        </aside>

        <!-- 主区域 -->
        <main id="main">
            <!-- 顶栏 -->
            <header id="header">
                <h1>多模态文档问答助手</h1>
                <div id="header-actions">
                    <button id="btn-interview" class="btn-header btn-interview" title="模拟面试">🎤 模拟面试</button>
                    <button id="btn-jd" class="btn-header btn-jd" title="岗位JD分析">🎯 岗位分析</button>
                    <button id="btn-resume" class="btn-header btn-resume" title="简历分析">📋 简历分析</button>
                    <button id="btn-new-session" class="btn-header" title="新建会话">🔄 新建会话</button>
                    <span id="status-indicator" class="status-ready">● 就绪</span>
                </div>
            </header>

            <!-- 消息区域 -->
            <div id="chat-messages">
            </div>

            <!-- 图片预览（发送前） -->
            <div id="image-preview" class="hidden">
                <img id="preview-img" src="" alt="预览">
                <button id="clear-image" title="移除图片">✕</button>
            </div>

            <!-- 输入区域 -->
            <div id="input-area">
                <div id="input-actions">
                    <button id="btn-upload" title="上传文件到知识库">📎</button>
                    <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.txt,.md" hidden multiple>
                    <button id="btn-voice" title="语音输入">🎙️</button>
                    <button id="btn-image" title="发送图片问答">🖼️</button>
                    <input type="file" id="image-input" accept=".png,.jpg,.jpeg" hidden>
                </div>
                <textarea id="message-input" placeholder="输入你的问题…" rows="1"></textarea>
                <button id="btn-send" title="发送">➤</button>
            </div>
        </main>
    </div>

    <!-- 上传进度模态框（知识库文件） -->
    <div id="upload-modal" class="modal hidden">
        <div class="modal-content">
            <h3>📤 文件处理中</h3>
            <div id="upload-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p id="upload-status-text">准备中...</p>
            </div>
            <button id="btn-close-modal" class="hidden">关闭</button>
        </div>
    </div>

    <!-- 简历分析模态框 -->
    <div id="resume-modal" class="modal hidden">
        <div class="modal-content resume-modal-content">
            <div class="resume-modal-header">
                <h3>📋 简历分析</h3>
                <button id="btn-close-resume" class="btn-modal-close">✕</button>
            </div>

            <!-- Tab 切换 -->
            <div class="resume-tabs">
                <button class="resume-tab active" data-tab="upload">📄 上传简历</button>
                <button class="resume-tab" data-tab="paste">📝 粘贴文本</button>
            </div>

            <!-- 上传 Tab -->
            <div id="resume-tab-upload" class="resume-tab-content active">
                <div id="resume-drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <span class="drop-icon">📤</span>
                        <p>拖拽简历文件到此处，或 <strong>点击选择</strong></p>
                        <p class="drop-hint">支持 PDF、PNG、JPG、TXT、MD（最大 50MB）</p>
                    </div>
                    <input type="file" id="resume-file-input" accept=".pdf,.png,.jpg,.jpeg,.txt,.md" hidden>
                </div>
                <div id="resume-file-info" class="hidden">
                    <span id="resume-file-name"></span>
                    <button id="btn-clear-resume-file" class="btn-small">✕ 移除</button>
                </div>
            </div>

            <!-- 粘贴 Tab -->
            <div id="resume-tab-paste" class="resume-tab-content">
                <textarea id="resume-text-input" placeholder="在此粘贴你的简历内容..." rows="8"></textarea>
            </div>

            <!-- 分析选项 -->
            <div class="resume-options">
                <input type="text" id="resume-position" placeholder="目标岗位（选填，如：Java后端工程师）">
                <input type="text" id="resume-question" placeholder="分析要求（选填，如：重点分析项目经历）" value="请对我的简历进行全面分析评估">
            </div>

            <button id="btn-start-analysis" class="btn-primary">🔍 开始分析</button>
        </div>
    </div>

    <!-- JD 分析模态框 -->
    <div id="jd-modal" class="modal hidden">
        <div class="modal-content jd-modal-content">
            <div class="jd-modal-header">
                <h3>🎯 岗位JD分析</h3>
                <button id="btn-close-jd" class="btn-modal-close">✕</button>
            </div>

            <!-- Tab 切换 -->
            <div class="jd-tabs">
                <button class="jd-tab active" data-tab="upload">📄 上传JD文件</button>
                <button class="jd-tab" data-tab="paste">📝 粘贴JD文本</button>
            </div>

            <!-- 上传 Tab -->
            <div id="jd-tab-upload" class="jd-tab-content active">
                <div id="jd-drop-zone" class="drop-zone">
                    <div class="drop-zone-content">
                        <span class="drop-icon">📤</span>
                        <p>拖拽 JD 文件到此处，或 <strong>点击选择</strong></p>
                        <p class="drop-hint">支持 PDF、PNG、JPG、TXT、MD（最大 50MB）</p>
                    </div>
                    <input type="file" id="jd-file-input" accept=".pdf,.png,.jpg,.jpeg,.txt,.md" hidden>
                </div>
                <div id="jd-file-info" class="hidden">
                    <span id="jd-file-name"></span>
                    <button id="btn-clear-jd-file" class="btn-small">✕ 移除</button>
                </div>
            </div>

            <!-- 粘贴 Tab -->
            <div id="jd-tab-paste" class="jd-tab-content">
                <textarea id="jd-text-input" placeholder="在此粘贴岗位描述（JD）内容..." rows="8"></textarea>
            </div>

            <!-- 分析选项 -->
            <div class="jd-options">
                <input type="text" id="jd-question" placeholder="分析要求（选填，如：重点关注技术栈要求）" value="请分析该岗位的核心要求并给出简历写作建议">
            </div>

            <button id="btn-start-jd-analysis" class="btn-primary btn-jd-primary">🔍 开始分析</button>
        </div>
    </div>

    <!-- 模拟面试模态框 -->
    <div id="interview-modal" class="modal hidden">
        <div class="modal-content jd-modal-content">
            <div class="jd-modal-header">
                <h3>🎤 模拟面试</h3>
                <button id="btn-close-interview" class="btn-modal-close">✕</button>
            </div>
            <div class="resume-options">
                <input type="text" id="interview-focus" placeholder="面试重点（选填，如：RAG / Agent 工程 / 后端系统设计）">
                <input type="text" id="interview-count" placeholder="题量（选填，默认 5 题，如：3）">
            </div>
            <p class="drop-hint" style="margin-top: 10px;">会自动结合当前会话中的 JD、简历和历史对话生成题目，并对你的作答逐题评分。</p>
            <button id="btn-start-interview" class="btn-primary btn-interview-primary">🚀 开始模拟面试</button>
        </div>
    </div>

    <script src="./static/js/app.js"></script>
</body>
</html>
